<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX DFD - Level 1: Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #a21caf;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .header {
            background: var(--surface);
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .diagram-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: 85vh;
        }

        .entity {
            fill: white;
            stroke: var(--text);
            stroke-width: 2.5;
        }

        .process {
            fill: #fdf4ff;
            stroke: var(--accent);
            stroke-width: 2.5;
        }

        .ds-line {
            fill: none;
            stroke: #059669;
            stroke-width: 2.5;
        }

        .ds-bar {
            fill: #059669;
        }

        .arrow-line {
            stroke: #64748b;
            stroke-width: 1.8;
            fill: none;
        }

        .text-main {
            font-weight: 800;
            font-size: 15px;
            fill: var(--text);
            text-anchor: middle;
        }

        .text-meta {
            font-weight: 600;
            font-size: 10px;
            fill: #64748b;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .text-flow {
            font-weight: 700;
            font-size: 9px;
            fill: #334155;
            text-anchor: middle;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>MoveX Logistics - Level 1 DFD: Hub Staff</h1>
    </header>
    <div class="nav-links">
        <a class="nav-btn" href="level0.html">Level 0</a>
        <a class="nav-btn" href="level1.html">Level 1 (All)</a>
        <a class="nav-btn" href="admin_level1.html">Admin</a>
        <a class="nav-btn" href="franchisee_level1.html">Franchisee</a>
        <a class="nav-btn active" href="staff_level1.html">Staff</a>
        <a class="nav-btn" href="user_level1.html">User</a>
    </div>
    <div class="diagram-container">
        <svg viewBox="0 0 1200 900">
            <defs>
                <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L6,3 L0,6 Z" fill="#64748b" />
                </marker>
            </defs>

            <!-- LEFT: STAFF ACTOR & VERTICAL BUS -->
            <rect x="50" y="80" width="180" height="80" class="entity" />
            <text x="140" y="125" class="text-main" style="font-size:16px;">Staff</text>

            <!-- 4 PROCESSES -->
            <circle cx="500" cy="120" r="50" class="process" />
            <path d="M 456 95 L 544 95" stroke="var(--accent)" stroke-width="1.5" />
            <text x="500" y="90" class="text-meta">1.0</text>
            <text x="500" y="125" class="text-main" style="font-size:13px;">Login</text>

            <circle cx="500" cy="280" r="50" class="process" />
            <path d="M 456 255 L 544 255" stroke="var(--accent)" stroke-width="1.5" />
            <text x="500" y="250" class="text-meta">2.0</text>
            <text x="500" y="280" class="text-main" style="font-size:13px;">View</text>
            <text x="500" y="298" class="text-main" style="font-size:13px;">Assignments</text>

            <circle cx="500" cy="440" r="50" class="process" />
            <path d="M 456 415 L 544 415" stroke="var(--accent)" stroke-width="1.5" />
            <text x="500" y="410" class="text-meta">3.0</text>
            <text x="500" y="440" class="text-main" style="font-size:13px;">Update</text>
            <text x="500" y="458" class="text-main" style="font-size:13px;">Status</text>

            <circle cx="500" cy="600" r="50" class="process" />
            <path d="M 456 575 L 544 575" stroke="var(--accent)" stroke-width="1.5" />
            <text x="500" y="570" class="text-meta">4.0</text>
            <text x="500" y="605" class="text-main" style="font-size:13px;">Settings</text>

            <!-- DATASTORES (Configured for Staff Logic: D1, D2) -->
            <path d="M 1100 95 H 850 V 155 H 1100" class="ds-line" />
            <rect x="865" y="95" width="15" height="60" class="ds-bar" />
            <text x="980" y="130" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1030 255 H 850 V 315 H 1030" class="ds-line" />
            <rect x="865" y="255" width="15" height="60" class="ds-bar" />
            <text x="955" y="290" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <!-- ============ RIGHT FLOWS (to Data Stores) ============ -->

            <!-- 1.0 Login → D1: Users -->
            <path d="M 549 110 H 850" class="arrow-line" marker-end="url(#arr)" />
            <text x="700" y="105" class="text-flow">Check Username &amp; Hash</text>
            <path d="M 850 130 H 549" class="arrow-line" marker-end="url(#arr)" />
            <text x="700" y="145" class="text-flow">User Role &amp; Status</text>

            <!-- 2.0 View Assignments → D2: Shipments -->
            <path d="M 549 270 H 850" class="arrow-line" marker-end="url(#arr)" />
            <text x="700" y="265" class="text-flow">Get By assigned_staff_id</text>
            <path d="M 850 290 H 549" class="arrow-line" marker-end="url(#arr)" />
            <text x="700" y="305" class="text-flow">Shipment Records</text>

            <!-- 3.0 Update Status → D2: Shipments (L-Shape UP to D2) -->
            <path d="M 549 430 H 990 V 315" class="arrow-line" marker-end="url(#arr)" />
            <text x="770" y="425" class="text-flow">Update Status Column</text>
            <path d="M 1010 315 V 450 H 549" class="arrow-line" marker-end="url(#arr)" />
            <text x="780" y="465" class="text-flow">Rows Updated</text>

            <!-- 4.0 Settings → D1: Users (L-Shape Bypass UP to D1) -->
            <path d="M 549 590 H 1050 V 155" class="arrow-line" marker-end="url(#arr)" />
            <text x="800" y="585" class="text-flow">Update Own Record</text>
            <path d="M 1070 155 V 610 H 549" class="arrow-line" marker-end="url(#arr)" />
            <text x="810" y="625" class="text-flow">Name, Phone, Hash</text>

            <!-- ============ LEFT FLOWS (from Actor) ============ -->

            <!-- 1.0 Login -->
            <path d="M 230 110 H 451" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="105" class="text-flow">Username &amp; Password</text>
            <path d="M 451 130 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="145" class="text-flow">Dashboard Access</text>

            <!-- 2.0 View Assignments -->
            <path d="M 210 160 V 270 H 451" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="265" class="text-flow">View My Deliveries</text>
            <path d="M 451 290 H 190 V 160" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="305" class="text-flow">Assigned Shipment List</text>

            <!-- 3.0 Update Status -->
            <path d="M 170 160 V 430 H 451" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="425" class="text-flow">Mark Delivered / Not Delivered</text>
            <path d="M 451 450 H 150 V 160" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="465" class="text-flow">Update Count</text>

            <!-- 4.0 Settings -->
            <path d="M 130 160 V 590 H 451" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="585" class="text-flow">Update Name / Phone / PW</text>
            <path d="M 451 610 H 110 V 160" class="arrow-line" marker-end="url(#arr)" />
            <text x="325" y="625" class="text-flow">Profile Info</text>
        </svg>
    </div>
</body>

</html>
