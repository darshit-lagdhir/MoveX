<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX DFD - Level 1: Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #a21caf;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .header {
            background: var(--surface);
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .diagram-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: 85vh;
        }

        .entity {
            fill: white;
            stroke: var(--text);
            stroke-width: 2.5;
        }

        .process {
            fill: #fdf4ff;
            stroke: var(--accent);
            stroke-width: 2.5;
        }

        .ds-line {
            fill: none;
            stroke: #059669;
            stroke-width: 2.5;
        }

        .ds-bar {
            fill: #059669;
        }

        .arrow-line {
            stroke: #64748b;
            stroke-width: 1.8;
            fill: none;
        }

        .text-main {
            font-weight: 800;
            font-size: 15px;
            fill: var(--text);
            text-anchor: middle;
        }

        .text-meta {
            font-weight: 600;
            font-size: 10px;
            fill: #64748b;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .text-flow {
            font-weight: 700;
            font-size: 9px;
            fill: #334155;
            text-anchor: middle;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>MoveX Logistics - Level 1 DFD: Hub Staff</h1>
    </header>
    <div class="nav-links">
        <a class="nav-btn" href="level0.html">Level 0</a>
        <a class="nav-btn" href="level1.html">Level 1 (All)</a>
        <a class="nav-btn" href="admin_level1.html">Admin</a>
        <a class="nav-btn" href="franchisee_level1.html">Franchisee</a>
        <a class="nav-btn active" href="staff_level1.html">Staff</a>
        <a class="nav-btn" href="user_level1.html">User</a>
    </div>
    <div class="diagram-container">
        <svg viewBox="0 0 1200 750">
            <defs>
                <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L6,3 L0,6 Z" fill="#64748b" />
                </marker>
            </defs>

            <!-- LEFT: STAFF ACTOR -->
            <rect x="50" y="55" width="180" height="630" class="entity" />
            <text x="140" y="350" class="text-main" style="font-size:18px;">HUB</text>
            <text x="140" y="375" class="text-main" style="font-size:18px;">STAFF</text>
            <text x="140" y="398" class="text-meta">Role: Staff</text>

            <!--
                PROCESSES from actual staff pages:
                1.0 Login              → /api/auth/login
                2.0 View Assignments   → staff-assignments.html (view assigned shipments)
                3.0 Update Status      → staff-assignments.html (bulk update: Out for Delivery / Delivered / Not Delivered)
                4.0 Settings           → staff-settings.html (update name/phone, change password)

                DATASTORES staff actually touches:
                D1: Users       → login check
                D2: Shipments   → view assigned shipments, update status
                D1: Users       → update own profile
            -->

            <!-- 1.0 Login -->
            <circle cx="500" cy="140" r="50" class="process" />
            <text x="500" y="135" class="text-meta">1.0</text>
            <text x="500" y="150" class="text-main" style="font-size:12px;">Login</text>

            <!-- 2.0 View Assignments -->
            <circle cx="500" cy="310" r="50" class="process" />
            <text x="500" y="305" class="text-meta">2.0</text>
            <text x="500" y="320" class="text-main" style="font-size:12px;">View Assignments</text>

            <!-- 3.0 Update Status -->
            <circle cx="500" cy="480" r="50" class="process" />
            <text x="500" y="475" class="text-meta">3.0</text>
            <text x="500" y="490" class="text-main" style="font-size:12px;">Update Status</text>

            <!-- 4.0 Settings -->
            <circle cx="500" cy="650" r="50" class="process" />
            <text x="500" y="645" class="text-meta">4.0</text>
            <text x="500" y="660" class="text-main" style="font-size:12px;">Settings</text>

            <!-- DATASTORES (only 2 the staff actually uses) -->
            <path d="M 1100 115 H 900 V 175 H 1100" class="ds-line" />
            <rect x="915" y="115" width="15" height="60" class="ds-bar" />
            <text x="1010" y="150" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 285 H 900 V 345 H 1100" class="ds-line" />
            <rect x="915" y="285" width="15" height="60" class="ds-bar" />
            <text x="1010" y="320" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 455 H 900 V 515 H 1100" class="ds-line" />
            <rect x="915" y="455" width="15" height="60" class="ds-bar" />
            <text x="1010" y="490" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 625 H 900 V 685 H 1100" class="ds-line" />
            <rect x="915" y="625" width="15" height="60" class="ds-bar" />
            <text x="1010" y="660" class="text-main" style="font-size:13px;">D1: Users</text>

            <!-- 1.0 Login -->
            <path d="M 230 130 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="125" class="text-flow">Username &amp; Password</text>
            <path d="M 445 150 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="165" class="text-flow">Dashboard Access</text>
            <path d="M 555 130 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="125" class="text-flow">Check Username &amp; Hash</text>
            <path d="M 900 150 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="165" class="text-flow">Staff Role &amp; Status</text>

            <!-- 2.0 View Assignments -->
            <path d="M 230 300 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="295" class="text-flow">View My Deliveries</text>
            <path d="M 445 320 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="335" class="text-flow">Assigned Shipment List</text>
            <path d="M 555 300 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="295" class="text-flow">Get By assigned_staff_id</text>
            <path d="M 900 320 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="335" class="text-flow">Shipment Records</text>

            <!-- 3.0 Update Status -->
            <path d="M 230 470 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="465" class="text-flow">Mark Delivered / Not Delivered</text>
            <path d="M 445 490 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="505" class="text-flow">Update Count</text>
            <path d="M 555 470 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="465" class="text-flow">Update Status Column</text>
            <path d="M 900 490 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="505" class="text-flow">Rows Updated</text>

            <!-- 4.0 Settings -->
            <path d="M 230 640 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="635" class="text-flow">Update Name / Phone / PW</text>
            <path d="M 445 660 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="675" class="text-flow">Profile Info</text>
            <path d="M 555 640 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="635" class="text-flow">Update Own Record</text>
            <path d="M 900 660 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="675" class="text-flow">Name, Phone, Hash</text>
        </svg>
    </div>
</body>

</html>
