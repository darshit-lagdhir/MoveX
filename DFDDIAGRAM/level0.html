<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX Context Diagram - Level 0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fff;
            color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .box {
            fill: #fff;
            stroke: #000;
            stroke-width: 1.5;
        }

        .circ {
            fill: #fff;
            stroke: #000;
            stroke-width: 2;
        }

        .dv {
            stroke: #000;
            stroke-width: 1.5;
        }

        .fl {
            fill: none;
            stroke: #000;
            stroke-width: 1;
            marker-end: url(#a);
        }

        .tn {
            font-size: 14px;
            font-weight: 800;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .tp {
            font-size: 12px;
            font-weight: 800;
            text-anchor: middle;
        }

        .tt {
            font-size: 18px;
            font-weight: 800;
            text-anchor: middle;
        }

        .tsub {
            font-size: 12px;
            font-weight: 600;
            text-anchor: middle;
        }

        .tf {
            font-size: 10px;
            font-weight: 700;
            text-anchor: middle;
            paint-order: stroke;
            stroke: #fff;
            stroke-width: 3px;
        }
    </style>
</head>

<body>
    <svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
            <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#000" />
            </marker>
        </defs>

        <!-- ======= CENTRAL PROCESS (Center=450,350  R=110) ======= -->
        <g transform="translate(450, 350)">
            <circle class="circ" r="110" />
            <line class="dv" x1="-110" y1="0" x2="110" y2="0" />
            <text class="tp" y="-60">0.0</text>
            <text class="tt" y="-20">MoveX Central</text>
            <text class="tsub" y="60">Logistic Backend</text>
        </g>

        <!-- ======= ENTITIES ======= -->
        <!-- Admin (Top): center X=450, box at (350,30)-(550,100) -->
        <g transform="translate(350, 30)">
            <rect class="box" width="200" height="70" />
            <text class="tn" x="100" y="42">SYSTEM ADMIN</text>
        </g>
        <!-- Customer (Left): center Y=350, box at (40,315)-(240,385) -->
        <g transform="translate(40, 315)">
            <rect class="box" width="200" height="70" />
            <text class="tn" x="100" y="42">CUSTOMER</text>
        </g>
        <!-- Franchisee (Right): center Y=350, box at (660,315)-(860,385) -->
        <g transform="translate(660, 315)">
            <rect class="box" width="200" height="70" />
            <text class="tn" x="100" y="42">FRANCHISEE HUB</text>
        </g>
        <!-- Staff (Bottom): center X=450, box at (350,600)-(550,670) -->
        <g transform="translate(350, 600)">
            <rect class="box" width="200" height="70" />
            <text class="tn" x="100" y="42">HUB STAFF</text>
        </g>

        <!-- ======= FLOWS ======= -->
        <!-- Circle edges: Top=240, Bottom=460, Left=340, Right=560 -->

        <!-- ADMIN (Top) -->
        <!-- System Setup: Admin -> System (downward) -->
        <path class="fl" d="M430,100 L430,240" />
        <text class="tf" x="395" y="175">System Setup</text>
        <!-- Business Reports: System -> Admin (upward) -->
        <path class="fl" d="M470,240 L470,100" />
        <text class="tf" x="510" y="175">Business Reports</text>

        <!-- CUSTOMER (Left) -->
        <!-- Login Info: Customer -> System -->
        <path class="fl" d="M240,335 L340,335" />
        <text class="tf" x="290" y="328">Login Info</text>
        <!-- Booking Details: Customer -> System -->
        <path class="fl" d="M240,355 L340,355" />
        <text class="tf" x="290" y="368">Booking Details</text>
        <!-- Tracking Info: System -> Customer -->
        <path class="fl" d="M340,375 L240,375" />
        <text class="tf" x="290" y="393">Tracking Info</text>

        <!-- FRANCHISEE HUB (Right) -->
        <!-- Price & Weight: Franchisee -> System -->
        <path class="fl" d="M660,335 L560,335" />
        <text class="tf" x="610" y="328">Price &amp; Weight</text>
        <!-- Staff Assigning: Franchisee -> System -->
        <path class="fl" d="M660,355 L560,355" />
        <text class="tf" x="610" y="368">Staff Assigning</text>
        <!-- New Requests: System -> Franchisee -->
        <path class="fl" d="M560,375 L660,375" />
        <text class="tf" x="610" y="393">New Requests</text>

        <!-- HUB STAFF (Bottom) -->
        <!-- Updates: Staff -> System (upward) -->
        <path class="fl" d="M430,600 L430,460" />
        <text class="tf" x="395" y="535">Updates</text>
        <!-- Job List: System -> Staff (downward) -->
        <path class="fl" d="M470,460 L470,600" />
        <text class="tf" x="510" y="535">Job List</text>

    </svg>
</body>

</html>
