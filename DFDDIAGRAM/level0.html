<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #6366f1;
            --accent: #a21caf;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .header {
            background: var(--surface);
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .diagram-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: 80vh;
        }

        .entity {
            fill: white;
            stroke: var(--text);
            stroke-width: 2.5;
        }

        .system-circle {
            fill: #eff6ff;
            stroke: var(--primary);
            stroke-width: 4;
        }

        .arrow-line {
            stroke: #64748b;
            stroke-width: 1.8;
            fill: none;
        }

        .text-main {
            font-weight: 800;
            font-size: 15px;
            fill: var(--text);
            text-anchor: middle;
        }

        .text-meta {
            font-weight: 600;
            font-size: 10px;
            fill: #64748b;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .text-flow {
            font-weight: 700;
            font-size: 9px;
            fill: #334155;
            text-anchor: middle;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>MoveX</h1>
    </header>

    <div class="nav-links">
        <a class="nav-btn active" href="level0.html">Level 0</a>
        <a class="nav-btn" href="level1.html">Level 1 (All)</a>
        <a class="nav-btn" href="admin_level1.html">Admin</a>
        <a class="nav-btn" href="franchisee_level1.html">Franchisee</a>
        <a class="nav-btn" href="staff_level1.html">Staff</a>
        <a class="nav-btn" href="user_level1.html">User</a>
    </div>

    <div class="diagram-container">
        <svg viewBox="0 0 1000 750">
            <defs>
                <marker id="arrhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                    <path d="M0,0 L8,4 L0,8 Z" fill="#64748b" />
                </marker>
            </defs>

            <!-- TOP ROW: 4 EXTERNAL ENTITIES (matching 4 user roles) -->
            <rect x="50" y="60" width="180" height="80" class="entity" />
            <text x="140" y="105" class="text-main">Admin</text>

            <rect x="290" y="60" width="180" height="80" class="entity" />
            <text x="380" y="105" class="text-main">Customer</text>

            <rect x="530" y="60" width="180" height="80" class="entity" />
            <text x="620" y="105" class="text-main">Franchisee</text>

            <rect x="770" y="60" width="180" height="80" class="entity" />
            <text x="860" y="105" class="text-main">Staff</text>

            <!-- CENTRAL SYSTEM CIRCLE -->
            <circle cx="500" cy="540" r="110" class="system-circle" />
            <text x="500" y="540" font-weight="900" font-size="22" fill="#2563eb" text-anchor="middle">MoveX</text>

            <!--
                FLOW LABELS — simple English, based on actual backend routes:

                ADMIN sends:    Login, Manage Users/Shipments/Franchises, Settings
                ADMIN gets:     Dashboard Data, User Lists, Shipment Lists

                CUSTOMER sends: Register, Login, Book Shipment, Track Request
                CUSTOMER gets:  Tracking Info, Profile Data, Booking Confirmation

                FRANCHISEE sends: Login, Create Shipment, Assign Staff, Manage Staff
                FRANCHISEE gets:  Shipment List, Staff List, Pickup Requests

                STAFF sends:    Login, Delivery Status Updates
                STAFF gets:     Assigned Deliveries, Profile Info
            -->

            <!-- SYSTEM ADMIN FLOWS -->
            <path d="M 120 140 V 475 H 411" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="105" y="300" class="text-flow" transform="rotate(-90 105 300)">Login / Manage Users
                / Shipments</text>
            <path d="M 424 460 H 160 V 140" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="175" y="300" class="text-flow" transform="rotate(-90 175 300)">Dashboard Stats /
                User &amp; Franchise Lists</text>

            <!-- CUSTOMER FLOWS -->
            <path d="M 360 140 V 445 H 444" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="345" y="290" class="text-flow" transform="rotate(-90 345 290)">Register / Login /
                Book Shipment</text>
            <path d="M 467 435 H 400 V 140" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="415" y="290" class="text-flow" transform="rotate(-90 415 290)">Tracking Info /
                Booking Confirmation</text>

            <!-- FRANCHISEE HUB FLOWS -->
            <path d="M 600 140 V 435 H 533" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="585" y="290" class="text-flow" transform="rotate(-90 585 290)">Create Shipment /
                Assign Staff</text>
            <path d="M 556 445 H 640 V 140" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="655" y="290" class="text-flow" transform="rotate(-90 655 290)">Shipment List /
                Pickup Requests</text>

            <!-- HUB STAFF FLOWS -->
            <path d="M 840 140 V 475 H 589" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="825" y="300" class="text-flow" transform="rotate(-90 825 300)">Login /
                Delivery Status Updates</text>
            <path d="M 602 500 H 880 V 140" class="arrow-line" marker-end="url(#arrhead)" />
            <text x="895" y="300" class="text-flow" transform="rotate(-90 895 300)">Assigned Deliveries /
                Profile Info</text>
        </svg>
    </div>
</body>

</html>
