<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX System DFD - Level 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fff;
            color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .box {
            fill: #fff;
            stroke: #000;
            stroke-width: 1.5;
        }

        .circ {
            fill: #fff;
            stroke: #000;
            stroke-width: 1.2;
        }

        .dv {
            stroke: #000;
            stroke-width: 1;
        }

        .sl {
            stroke: #000;
            stroke-width: 2;
        }

        .fl {
            fill: none;
            stroke: #000;
            stroke-width: 1;
            marker-end: url(#a);
        }

        .tn {
            font-size: 13px;
            font-weight: 800;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .tp {
            font-size: 10px;
            font-weight: 800;
            text-anchor: middle;
        }

        .td {
            font-size: 11px;
            font-weight: 600;
            text-anchor: middle;
        }

        .tf {
            font-size: 9px;
            font-weight: 700;
            text-anchor: middle;
            paint-order: stroke;
            stroke: #fff;
            stroke-width: 3px;
        }

        .ts {
            font-size: 12px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <svg viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
            <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#000" />
            </marker>
        </defs>

        <!-- ENTITIES (X=200..380) - pushed right so left gutter is 140+ units clear -->
        <g transform="translate(200,55)">
            <rect class="box" width="180" height="50" /><text class="tn" x="90" y="30">SYSTEM ADMIN</text>
        </g>
        <g transform="translate(200,205)">
            <rect class="box" width="180" height="50" /><text class="tn" x="90" y="30">CUSTOMER</text>
        </g>
        <g transform="translate(200,365)">
            <rect class="box" width="180" height="50" /><text class="tn" x="90" y="30">FRANCHISEE HUB</text>
        </g>
        <g transform="translate(200,505)">
            <rect class="box" width="180" height="50" /><text class="tn" x="90" y="30">HUB STAFF</text>
        </g>

        <!-- PROCESSES (X=530, R=42) -->
        <g transform="translate(530,80)">
            <circle class="circ" r="42" />
            <line class="dv" x1="-42" y1="0" x2="42" y2="0" /><text class="tp" y="-10">1.0</text><text class="td"
                y="18">Identity</text>
        </g>
        <g transform="translate(530,230)">
            <circle class="circ" r="42" />
            <line class="dv" x1="-42" y1="0" x2="42" y2="0" /><text class="tp" y="-10">2.0</text><text class="td"
                y="18">Booking Cycle</text>
        </g>
        <g transform="translate(530,390)">
            <circle class="circ" r="42" />
            <line class="dv" x1="-42" y1="0" x2="42" y2="0" /><text class="tp" y="-10">3.0</text><text class="td"
                y="18">Pricing</text>
        </g>
        <g transform="translate(530,530)">
            <circle class="circ" r="42" />
            <line class="dv" x1="-42" y1="0" x2="42" y2="0" /><text class="tp" y="-10">4.0</text><text class="td"
                y="18">Dispatch</text>
        </g>
        <g transform="translate(530,720)">
            <circle class="circ" r="42" />
            <line class="dv" x1="-42" y1="0" x2="42" y2="0" /><text class="tp" y="-10">5.0</text><text class="td"
                y="18">Admin Engine</text>
        </g>

        <!-- STORES -->
        <g transform="translate(840,55)">
            <line class="sl" x1="0" y1="0" x2="200" y2="0" />
            <line class="sl" x1="0" y1="50" x2="200" y2="50" /><text class="ts" x="10" y="30">D1: Users &amp;
                Roles</text>
        </g>
        <g transform="translate(840,365)">
            <line class="sl" x1="0" y1="0" x2="200" y2="0" />
            <line class="sl" x1="0" y1="50" x2="200" y2="50" /><text class="ts" x="10" y="30">D2: Shipments (M)</text>
        </g>

        <!-- === ROW 1: Admin <-> Identity <-> D1 === -->
        <path class="fl" d="M380,68 L488,68" />
        <text class="tf" x="434" y="63">Login Request</text>
        <path class="fl" d="M488,92 L380,92" />
        <text class="tf" x="434" y="107">Login Status</text>
        <path class="fl" d="M572,68 L840,68" />
        <text class="tf" x="706" y="63">Check Credentials</text>
        <path class="fl" d="M840,92 L572,92" />
        <text class="tf" x="706" y="107">User Details</text>

        <!-- === ROW 2: Customer <-> Booking === -->
        <path class="fl" d="M380,218 L488,218" />
        <text class="tf" x="434" y="213">Booking Details</text>
        <path class="fl" d="M488,242 L380,242" />
        <text class="tf" x="434" y="257">Tracking Info</text>

        <!-- === ROW 2 -> D2 (channel X=660) === -->
        <path class="fl" d="M572,220 L660,220 L660,375 L840,375" />
        <text class="tf" x="616" y="215">Save Shipment</text>
        <!-- === D2 -> ROW 2 (channel X=680) === -->
        <path class="fl" d="M840,380 L680,380 L680,245 L572,245" />
        <text class="tf" x="626" y="250">Confirmation</text>

        <!-- === ROW 3: Franchisee <-> Pricing <-> D2 (direct horizontal) === -->
        <path class="fl" d="M380,378 L488,378" />
        <text class="tf" x="434" y="373">Weight &amp; Price Info</text>
        <path class="fl" d="M488,402 L380,402" />
        <text class="tf" x="434" y="417">Price Quote</text>
        <path class="fl" d="M572,385 L840,385" />
        <text class="tf" x="706" y="380">Update Rates</text>
        <path class="fl" d="M840,400 L572,400" />
        <text class="tf" x="706" y="415">Final Amount</text>

        <!-- === ROW 4: Staff <-> Dispatch === -->
        <path class="fl" d="M380,518 L488,518" />
        <text class="tf" x="434" y="513">Job Request</text>
        <path class="fl" d="M488,542 L380,542" />
        <text class="tf" x="434" y="557">Delivery Updates</text>

        <!-- === ROW 4 -> D2 (channel X=700) === -->
        <path class="fl" d="M572,525 L700,525 L700,405 L840,405" />
        <text class="tf" x="636" y="520">View Orders</text>
        <!-- === D2 -> ROW 4 (channel X=720) === -->
        <path class="fl" d="M840,410 L720,410 L720,540 L572,540" />
        <text class="tf" x="636" y="555">Order Data</text>

        <!-- === ROW 5: Admin Engine <-> System Admin (LEFT gutter X=30,60) === -->
        <path class="fl" d="M200,90 L60,90 L60,725 L488,725" />
        <text class="tf" x="280" y="720">System Setup</text>
        <path class="fl" d="M488,715 L30,715 L30,75 L200,75" />
        <text class="tf" x="280" y="710">Business Reports</text>

        <!-- === ROW 5: Admin Engine <-> D1 (RIGHT gutter X=760,780) === -->
        <path class="fl" d="M572,730 L760,730 L760,92 L840,92" />
        <text class="tf" x="666" y="740">Manage Users</text>
        <path class="fl" d="M840,75 L780,75 L780,715 L572,715" />
        <text class="tf" x="666" y="710">User Info</text>

        <!-- VERTICAL CHAIN -->
        <path class="fl" d="M530,122 L530,188" />
        <path class="fl" d="M530,272 L530,348" />
        <path class="fl" d="M530,432 L530,488" />
        <path class="fl" d="M530,572 L530,678" />
    </svg>
</body>

</html>
