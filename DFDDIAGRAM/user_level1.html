<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX DFD - Level 1: User</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #a21caf;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .header {
            background: var(--surface);
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .diagram-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: 85vh;
        }

        .entity {
            fill: white;
            stroke: var(--text);
            stroke-width: 2.5;
        }

        .process {
            fill: #fdf4ff;
            stroke: var(--accent);
            stroke-width: 2.5;
        }

        .ds-line {
            fill: none;
            stroke: #059669;
            stroke-width: 2.5;
        }

        .ds-bar {
            fill: #059669;
        }

        .arrow-line {
            stroke: #64748b;
            stroke-width: 1.8;
            fill: none;
        }

        .text-main {
            font-weight: 800;
            font-size: 15px;
            fill: var(--text);
            text-anchor: middle;
        }

        .text-meta {
            font-weight: 600;
            font-size: 10px;
            fill: #64748b;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .text-flow {
            font-weight: 700;
            font-size: 9px;
            fill: #334155;
            text-anchor: middle;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>MoveX Logistics - Level 1 DFD: Customer (User)</h1>
    </header>
    <div class="nav-links">
        <a class="nav-btn" href="level0.html">Level 0</a>
        <a class="nav-btn" href="level1.html">Level 1 (All)</a>
        <a class="nav-btn" href="admin_level1.html">Admin</a>
        <a class="nav-btn" href="franchisee_level1.html">Franchisee</a>
        <a class="nav-btn" href="staff_level1.html">Staff</a>
        <a class="nav-btn active" href="user_level1.html">User</a>
    </div>
    <div class="diagram-container">
        <svg viewBox="0 0 1200 950">
            <defs>
                <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L6,3 L0,6 Z" fill="#64748b" />
                </marker>
            </defs>

            <!-- LEFT: USER ACTOR -->
            <rect x="50" y="55" width="180" height="850" class="entity" />
            <text x="140" y="470" class="text-main" style="font-size:18px;">CUSTOMER</text>
            <text x="140" y="495" class="text-main" style="font-size:18px;">(USER)</text>
            <text x="140" y="518" class="text-meta">Role: User</text>

            <!--
                DATASTORES user actually touches:
                D1: Users              → register, login, profile update
                D2: Shipments          → book shipment, track shipment
                D3: Password Resets    → forgot password (ONLY user role uses this)
            -->

            <!-- 1.0 Authentication (Merged Register/Login) -->
            <circle cx="500" cy="150" r="50" class="process" />
            <text x="500" y="145" class="text-meta">1.0</text>
            <text x="500" y="160" class="text-main" style="font-size:11px;">Authentication</text>

            <!-- 2.0 Book Shipment -->
            <circle cx="500" cy="320" r="50" class="process" />
            <text x="500" y="315" class="text-meta">2.0</text>
            <text x="500" y="330" class="text-main" style="font-size:12px;">Book Shipment</text>

            <!-- 3.0 Track Shipment -->
            <circle cx="500" cy="490" r="50" class="process" />
            <text x="500" y="485" class="text-meta">3.0</text>
            <text x="500" y="500" class="text-main" style="font-size:12px;">Track Shipment</text>

            <!-- 4.0 Manage Profile -->
            <circle cx="500" cy="660" r="50" class="process" />
            <text x="500" y="655" class="text-meta">4.0</text>
            <text x="500" y="670" class="text-main" style="font-size:12px;">Manage Profile</text>

            <!-- 5.0 Reset Password -->
            <circle cx="500" cy="830" r="50" class="process" />
            <text x="500" y="825" class="text-meta">5.0</text>
            <text x="500" y="840" class="text-main" style="font-size:12px;">Reset Password</text>

            <!-- DATASTORES (3 the user touches) -->
            <path d="M 1100 120 H 900 V 180 H 1100" class="ds-line" />
            <rect x="915" y="120" width="15" height="60" class="ds-bar" />
            <text x="1010" y="155" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 290 H 900 V 350 H 1100" class="ds-line" />
            <rect x="915" y="290" width="15" height="60" class="ds-bar" />
            <text x="1010" y="325" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 460 H 900 V 520 H 1100" class="ds-line" />
            <rect x="915" y="460" width="15" height="60" class="ds-bar" />
            <text x="1010" y="495" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 630 H 900 V 690 H 1100" class="ds-line" />
            <rect x="915" y="630" width="15" height="60" class="ds-bar" />
            <text x="1010" y="665" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 800 H 900 V 860 H 1100" class="ds-line" />
            <rect x="915" y="800" width="15" height="60" class="ds-bar" />
            <text x="1010" y="835" class="text-main" style="font-size:13px;">D3: Password Resets</text>

            <!-- FLOWS -->

            <!-- 1.0 Authentication -->
            <path d="M 230 140 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="135" class="text-flow">Login/Register Details</text>
            <path d="M 445 160 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="175" class="text-flow">Dashboard Access</text>
            <path d="M 555 140 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="135" class="text-flow">Check Creds / Insert</text>
            <path d="M 900 160 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="175" class="text-flow">User Status &amp; Detail</text>

            <!-- 2.0 Book Shipment -->
            <path d="M 230 310 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="305" class="text-flow">Sender &amp; Receiver Details</text>
            <path d="M 445 330 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="345" class="text-flow">Tracking ID</text>
            <path d="M 555 310 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="305" class="text-flow">Insert Shipment</text>
            <path d="M 900 330 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="345" class="text-flow">Saved Record</text>

            <!-- 3.0 Track Shipment -->
            <path d="M 230 480 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="475" class="text-flow">Enter Tracking ID</text>
            <path d="M 445 500 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="515" class="text-flow">Status &amp; Location</text>
            <path d="M 555 480 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="475" class="text-flow">Find By Tracking ID</text>
            <path d="M 900 500 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="515" class="text-flow">Shipment Record</text>

            <!-- 4.0 Manage Profile -->
            <path d="M 230 650 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="645" class="text-flow">Update Name / Phone / PW</text>
            <path d="M 445 670 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="685" class="text-flow">Profile Info</text>
            <path d="M 555 650 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="645" class="text-flow">Update Own Record</text>
            <path d="M 900 670 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="685" class="text-flow">Name, Phone, Hash</text>

            <!-- 5.0 Reset Password -->
            <path d="M 230 820 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="815" class="text-flow">Security Answers</text>
            <path d="M 445 840 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="855" class="text-flow">Password Changed</text>
            <path d="M 555 820 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="815" class="text-flow">Verify &amp; Save Token Hash</text>
            <path d="M 900 840 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="855" class="text-flow">Token Hash Valid / Used</text>

        </svg>
    </div>
</body>

</html>
