<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX DFD - Level 1: User</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #a21caf;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .header {
            background: var(--surface);
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .diagram-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: 85vh;
        }

        .entity {
            fill: white;
            stroke: var(--text);
            stroke-width: 2.5;
        }

        .process {
            fill: #fdf4ff;
            stroke: var(--accent);
            stroke-width: 2.5;
        }

        .ds-line {
            fill: none;
            stroke: #059669;
            stroke-width: 2.5;
        }

        .ds-bar {
            fill: #059669;
        }

        .arrow-line {
            stroke: #64748b;
            stroke-width: 1.8;
            fill: none;
        }

        .text-main {
            font-weight: 800;
            font-size: 15px;
            fill: var(--text);
            text-anchor: middle;
        }

        .text-meta {
            font-weight: 600;
            font-size: 10px;
            fill: #64748b;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .text-flow {
            font-weight: 700;
            font-size: 9px;
            fill: #334155;
            text-anchor: middle;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>MoveX Logistics - Level 1 DFD: Customer (User)</h1>
    </header>
    <div class="nav-links">
        <a class="nav-btn" href="level0.html">Level 0</a>
        <a class="nav-btn" href="level1.html">Level 1 (All)</a>
        <a class="nav-btn" href="admin_level1.html">Admin</a>
        <a class="nav-btn" href="franchisee_level1.html">Franchisee</a>
        <a class="nav-btn" href="staff_level1.html">Staff</a>
        <a class="nav-btn active" href="user_level1.html">User</a>
    </div>
    <div class="diagram-container">
        <svg viewBox="0 0 1200 1060">
            <defs>
                <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L6,3 L0,6 Z" fill="#64748b" />
                </marker>
            </defs>

            <!-- LEFT: USER ACTOR -->
            <rect x="50" y="55" width="180" height="950" class="entity" />
            <text x="140" y="510" class="text-main" style="font-size:18px;">CUSTOMER</text>
            <text x="140" y="535" class="text-main" style="font-size:18px;">(USER)</text>
            <text x="140" y="558" class="text-meta">Role: User</text>

            <!--
                PROCESSES from actual user pages:
                1.0 Register          → /api/auth/register (public, no login needed)
                2.0 Login             → /api/auth/login
                3.0 Book Shipment     → user-book.html → /api/dashboard/user/shipments/create
                4.0 Track Shipment    → user-track.html → /api/dashboard/user/shipments (view list + details)
                5.0 Profile           → user-profile.html → /api/me (GET/PUT) + /api/auth/change-password
                6.0 Reset Password    → forgot-password flow → /api/auth/reset-password-security + /api/auth/reset-password

                DATASTORES user actually touches:
                D1: Users              → register, login, profile update
                D2: Shipments          → book shipment, track shipment
                D3: Password Resets    → forgot password (ONLY user role uses this)
            -->

            <!-- 1.0 Register -->
            <circle cx="500" cy="120" r="50" class="process" />
            <text x="500" y="115" class="text-meta">1.0</text>
            <text x="500" y="130" class="text-main" style="font-size:12px;">Register</text>

            <!-- 2.0 Login -->
            <circle cx="500" cy="280" r="50" class="process" />
            <text x="500" y="275" class="text-meta">2.0</text>
            <text x="500" y="290" class="text-main" style="font-size:12px;">Login</text>

            <!-- 3.0 Book Shipment -->
            <circle cx="500" cy="440" r="50" class="process" />
            <text x="500" y="435" class="text-meta">3.0</text>
            <text x="500" y="450" class="text-main" style="font-size:12px;">Book Shipment</text>

            <!-- 4.0 Track Shipment -->
            <circle cx="500" cy="600" r="50" class="process" />
            <text x="500" y="595" class="text-meta">4.0</text>
            <text x="500" y="610" class="text-main" style="font-size:12px;">Track Shipment</text>

            <!-- 5.0 Profile -->
            <circle cx="500" cy="760" r="50" class="process" />
            <text x="500" y="755" class="text-meta">5.0</text>
            <text x="500" y="770" class="text-main" style="font-size:12px;">Profile</text>

            <!-- 6.0 Reset Password -->
            <circle cx="500" cy="920" r="50" class="process" />
            <text x="500" y="915" class="text-meta">6.0</text>
            <text x="500" y="930" class="text-main" style="font-size:12px;">Reset Password</text>

            <!-- DATASTORES (3 the user touches) -->
            <path d="M 1100 95 H 900 V 155 H 1100" class="ds-line" />
            <rect x="915" y="95" width="15" height="60" class="ds-bar" />
            <text x="1010" y="130" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 255 H 900 V 315 H 1100" class="ds-line" />
            <rect x="915" y="255" width="15" height="60" class="ds-bar" />
            <text x="1010" y="290" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 415 H 900 V 475 H 1100" class="ds-line" />
            <rect x="915" y="415" width="15" height="60" class="ds-bar" />
            <text x="1010" y="450" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 575 H 900 V 635 H 1100" class="ds-line" />
            <rect x="915" y="575" width="15" height="60" class="ds-bar" />
            <text x="1010" y="610" class="text-main" style="font-size:13px;">D2: Shipments</text>

            <path d="M 1100 735 H 900 V 795 H 1100" class="ds-line" />
            <rect x="915" y="735" width="15" height="60" class="ds-bar" />
            <text x="1010" y="770" class="text-main" style="font-size:13px;">D1: Users</text>

            <path d="M 1100 895 H 900 V 955 H 1100" class="ds-line" />
            <rect x="915" y="895" width="15" height="60" class="ds-bar" />
            <text x="1010" y="930" class="text-main" style="font-size:13px;">D3: Password Resets</text>

            <!-- 1.0 Register -->
            <path d="M 230 110 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="105" class="text-flow">Name, Username, Password</text>
            <path d="M 445 130 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="145" class="text-flow">Account Created</text>
            <path d="M 555 110 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="105" class="text-flow">Insert New User</text>
            <path d="M 900 130 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="145" class="text-flow">User ID</text>

            <!-- 2.0 Login -->
            <path d="M 230 270 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="265" class="text-flow">Username &amp; Password</text>
            <path d="M 445 290 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="305" class="text-flow">Dashboard Access</text>
            <path d="M 555 270 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="265" class="text-flow">Check Username &amp; Hash</text>
            <path d="M 900 290 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="305" class="text-flow">User Role &amp; Status</text>

            <!-- 3.0 Book Shipment -->
            <path d="M 230 430 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="425" class="text-flow">Sender &amp; Receiver Details</text>
            <path d="M 445 450 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="465" class="text-flow">Tracking ID</text>
            <path d="M 555 430 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="425" class="text-flow">Insert Shipment</text>
            <path d="M 900 450 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="465" class="text-flow">Saved Record</text>

            <!-- 4.0 Track Shipment -->
            <path d="M 230 590 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="585" class="text-flow">Enter Tracking ID</text>
            <path d="M 445 610 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="625" class="text-flow">Status &amp; Location</text>
            <path d="M 555 590 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="585" class="text-flow">Find By Tracking ID</text>
            <path d="M 900 610 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="625" class="text-flow">Shipment Record</text>

            <!-- 5.0 Profile -->
            <path d="M 230 750 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="745" class="text-flow">Update Name / Phone / PW</text>
            <path d="M 445 770 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="785" class="text-flow">Profile Info</text>
            <path d="M 555 750 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="745" class="text-flow">Update Own Record</text>
            <path d="M 900 770 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="785" class="text-flow">Name, Phone, Hash</text>

            <!-- 6.0 Reset Password (ONLY USER ROLE) -->
            <path d="M 230 910 H 445" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="905" class="text-flow">Security Answers</text>
            <path d="M 445 930 H 230" class="arrow-line" marker-end="url(#arr)" />
            <text x="338" y="945" class="text-flow">Password Changed</text>
            <path d="M 555 910 H 900" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="905" class="text-flow">Verify &amp; Save Token</text>
            <path d="M 900 930 H 555" class="arrow-line" marker-end="url(#arr)" />
            <text x="728" y="945" class="text-flow">Token Valid / Used</text>
        </svg>
    </div>
</body>

</html>
